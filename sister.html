<!DOCTYPE html>
<html>
<head>
<title>For My Sister 💖</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f3d9df;
    overflow: hidden;
}

/* Floating hearts */
.heart {
    position: fixed;
    font-size: 20px;
    animation: float 6s linear infinite;
    opacity: 0.6;
}

@keyframes float {
    0% { transform: translateY(100vh); }
    100% { transform: translateY(-10vh); }
}

/* Card */
.card {
    width: 85%;
    max-width: 700px;
    height: 80vh;
    background: #fff;
    border-radius: 25px;
    text-align: center;
    padding: 30px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* Title */
h1 {
    color: #7a1c35;
}

/* Play area split */
#playArea {
    display: flex;
    width: 100%;
    height: 300px;
    margin-top: 40px;
}

/* YES AREA (25%) */
#yesArea {
    width: 25%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* NO AREA (75%) */
#noArea {
    width: 75%;
    position: relative;
}

/* YES button */
#yesBtn {
    padding: 20px 50px;
    background: #ff4d6d;
    color: white;
    border: none;
    border-radius: 15px;
    font-size: 22px;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(255,77,109,0.4);
}

/* NO button */
#noBtn {
    position: absolute;
    left: 50%;
    top: 50%;
    padding: 12px 25px;
    background: #f8f8f8;
    border: 2px solid #e5cdd3;
    color: #7a1c35;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
    transform: translate(-50%, -50%);
}

/* SUCCESS SCREEN */
#success {
    display: none;
    text-align: center;
}

#success h1 {
    font-size: 50px;
}

img {
    width: 250px;
    border-radius: 20px;
    margin-top: 20px;
}

/* Confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    animation: fall 3s linear infinite;
}

@keyframes fall {
    0% { transform: translateY(-10px); }
    100% { transform: translateY(100vh); }
}
</style>
</head>

<body>

<!-- FLOATING HEARTS -->
<script>
for(let i=0;i<20;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="💖";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(3+Math.random()*3)+"s";
    document.body.appendChild(heart);
}
</script>

<!-- MAIN SCREEN -->
<div class="card" id="main">

    <h1 id="question"></h1>
    <p>Choose wisely. (The "No" button is... shy.)</p>

    <div id="playArea">

        <!-- LEFT 25% -->
        <div id="yesArea">
            <button id="yesBtn">YES 💖</button>
        </div>

        <!-- RIGHT 75% -->
        <div id="noArea">
            <button id="noBtn">NO</button>
        </div>

    </div>

</div>

<!-- SUCCESS SCREEN -->
<div class="card" id="success">
    <h1>💖 YAY!!! 💖</h1>
    <p>Best decision ever 😘</p>

    <!-- CHANGE IMAGE HERE -->
    <img src="https://valentineask.github.io/willyoubemyvalentine/Rishi.jpg">

    <p>Thankyou Love you 💖</p>
</div>

<script>
// Dynamic text
const params = new URLSearchParams(window.location.search);
const name = params.get("name") || "Me";
const sister = params.get("sisterName") || "Sis";

document.getElementById("question").innerText =
    `Hey ${sister}, will you always be my best sister? 💕 - ${name}`;

// NO button movement (ONLY inside 75%)
const noBtn = document.getElementById("noBtn");
const noArea = document.getElementById("noArea");

const messages = [
    "No 😢",
    "Are you sure? 🤔",
    "Think again 😭",
    "Please no 🥺",
    "I will cry 😭"
];

function moveNoButton(){
    const maxX = noArea.clientWidth - noBtn.offsetWidth;
    const maxY = noArea.clientHeight - noBtn.offsetHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
    noBtn.style.transform = "none";

    noBtn.innerText = messages[Math.floor(Math.random()*messages.length)];
}

// Desktop + Mobile
noBtn.addEventListener("mouseover", moveNoButton);
noBtn.addEventListener("touchstart", moveNoButton);
noBtn.addEventListener("click", moveNoButton);

// YES CLICK → SUCCESS PAGE
document.getElementById("yesBtn").onclick = function(){
    document.getElementById("main").style.display = "none";
    document.getElementById("success").style.display = "block";

    // Confetti
    for(let i=0;i<100;i++){
        let conf=document.createElement("div");
        conf.className="confetti";
        conf.style.left=Math.random()*100+"vw";
        conf.style.background=["red","blue","yellow","green","pink"][Math.floor(Math.random()*5)];
        conf.style.animationDuration=(2+Math.random()*3)+"s";
        document.body.appendChild(conf);
    }
};
</script>

</body>
</html>
